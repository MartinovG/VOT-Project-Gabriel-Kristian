apiVersion: apps/v1
kind: Deployment
metadata:
  name: vot-express-app
  namespace: default
  labels:
    app: vot-express-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vot-express-app
  template:
    metadata:
      labels:
        app: vot-express-app
    spec:
      containers:
      - name: express-api
        image: martinovg/vot-project-gabriel-kristian:latest
        imagePullPolicy: Always
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m"
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: database_url
        livenessProbe:
          httpGet:
            path: /api/tasks
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
